<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TaskFlow — 채팅</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100 flex flex-col">
  <header class="bg-white shadow-sm px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-4">
      <span class="text-teal-600 font-bold text-lg hidden md:block">TaskFlow</span>
      <span id="teamName" class="font-semibold text-gray-700"></span>
      <button id="menuBtn" class="md:hidden text-gray-500 text-xl">☰</button>
    </div>
    <nav class="hidden md:flex gap-2">
      <a href="kanban.html" class="px-4 py-1.5 border rounded text-sm font-medium text-gray-600 hover:bg-gray-50">칸반</a>
      <a href="chat.html" class="px-4 py-1.5 bg-teal-600 text-white rounded text-sm font-medium">채팅</a>
      <a href="members.html" class="px-4 py-1.5 border rounded text-sm font-medium text-gray-600 hover:bg-gray-50">멤버</a>
    </nav>
    <div class="hidden md:flex items-center gap-3">
      <span id="pollStatus" class="text-xs text-green-500">● 5초마다 새로고침</span>
      <span id="userEmail" class="text-sm text-gray-500"></span>
      <button onclick="doLogout()" class="text-sm text-gray-500">로그아웃</button>
    </div>
  </header>

  <!-- 모바일 메뉴 -->
  <div id="mobileMenu" class="hidden fixed inset-0 z-50">
    <div class="absolute inset-0 bg-black/40" onclick="closeMobileMenu()"></div>
    <div class="absolute right-0 top-0 h-full w-64 bg-white shadow-xl p-6 flex flex-col gap-4">
      <a href="kanban.html" class="flex items-center gap-3 text-gray-600">📋 칸반</a>
      <a href="chat.html" class="flex items-center gap-3 text-teal-600 font-medium">💬 채팅</a>
      <a href="members.html" class="flex items-center gap-3 text-gray-600">👥 팀 멤버</a>
      <button onclick="doLogout()" class="flex items-center gap-3 text-gray-600 mt-auto">🚪 로그아웃</button>
    </div>
  </div>

  <div class="flex-1 flex flex-col max-w-2xl w-full mx-auto p-4 gap-4">
    <div id="messageList" class="flex-1 bg-white rounded-xl shadow overflow-y-auto p-4 space-y-3" style="min-height:300px;max-height:60vh">
      <!-- empty state -->
      <div id="emptyState" class="hidden flex flex-col items-center justify-center h-full py-16 text-gray-400">
        <span class="text-5xl mb-3">💬</span>
        <p class="font-medium">아직 대화가 없습니다</p>
        <p class="text-sm mt-1">첫 메시지를 보내 팀원과 대화를 시작하세요</p>
      </div>
    </div>
    <!-- 입력창 -->
    <div class="bg-white rounded-xl shadow p-3">
      <div class="flex gap-2">
        <textarea id="msgInput" rows="2" placeholder="메시지 입력 (1000자 이내)…"
          class="flex-1 border rounded px-3 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-teal-500"></textarea>
        <button id="sendBtn" onclick="sendMessage()" class="bg-teal-600 text-white px-4 rounded font-semibold hover:bg-teal-700">전송</button>
      </div>
      <div class="flex justify-between mt-1 text-xs text-gray-400">
        <span id="charCount">0 / 1,000</span>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    requireAuth();
    const user = getUser();
    if (!user?.team_id) window.location.href = 'team.html';
    const teamId = user.team_id;

    document.getElementById('userEmail').textContent = user.email;

    let lastCreatedAt = null, pollTimer = null, retryCount = 0, retryDelay = 5000;

    async function loadTeam() {
      const res = await apiFetch(`/teams/${teamId}`);
      if (res?.ok) { const d = await res.json(); document.getElementById('teamName').textContent = d.name + ' 팀 · 채팅'; }
    }

    async function fetchMessages(since = null) {
      const url = since ? `/teams/${teamId}/messages?since=${encodeURIComponent(since)}` : `/teams/${teamId}/messages`;
      const res = await apiFetch(url);
      if (!res) return;
      if (!res.ok) return;
      retryCount = 0; retryDelay = 5000;
      setPollStatus(true);
      const msgs = await res.json();
      if (!since) {
        renderAll(msgs);
      } else {
        msgs.forEach(appendMessage);
        if (msgs.length) scrollBottom();
      }
    }

    function renderAll(msgs) {
      const list = document.getElementById('messageList');
      const empty = document.getElementById('emptyState');
      // emptyState를 먼저 떼어낸 후 innerHTML 초기화 (null 참조 방지)
      if (empty.parentNode) empty.parentNode.removeChild(empty);
      list.innerHTML = '';
      if (msgs.length === 0) { empty.classList.remove('hidden'); list.appendChild(empty); return; }
      empty.classList.add('hidden');
      msgs.forEach(m => list.appendChild(buildBubble(m)));
      scrollBottom();
      if (msgs.length) lastCreatedAt = msgs[msgs.length - 1].created_at;
    }

    function appendMessage(m) {
      const empty = document.getElementById('emptyState');
      if (empty) empty.classList.add('hidden');
      document.getElementById('messageList').appendChild(buildBubble(m));
      lastCreatedAt = m.created_at;
    }

    function buildBubble(m) {
      const isMine = m.user_id === user.id;
      const wrapper = document.createElement('div');
      wrapper.className = `flex ${isMine ? 'justify-end' : 'justify-start'} group`;
      wrapper.dataset.id = m.id;
      const time = new Date(m.created_at).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
      const deleteBtn = isMine ? `<button onclick="deleteMsg(${m.id})" class="hidden group-hover:block text-xs text-gray-400 hover:text-red-500 ml-1">🗑</button>` : '';
      wrapper.innerHTML = `
        <div class="max-w-xs md:max-w-sm">
          ${!isMine ? `<p class="text-xs text-gray-400 mb-0.5">${escHtml(m.user_email)} · ${time}</p>` : ''}
          <div class="flex items-end gap-1 ${isMine ? 'flex-row-reverse' : ''}">
            <div class="${isMine ? 'bg-teal-600 text-white' : 'bg-gray-100 text-gray-800'} rounded-xl px-3 py-2 text-sm break-words">${escHtml(m.content)}</div>
            ${deleteBtn}
          </div>
          ${isMine ? `<p class="text-xs text-gray-400 mt-0.5 text-right">${time}</p>` : ''}
        </div>`;
      return wrapper;
    }

    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function scrollBottom() { const l = document.getElementById('messageList'); l.scrollTop = l.scrollHeight; }

    async function sendMessage() {
      const inp = document.getElementById('msgInput');
      const content = inp.value.trim();
      if (!content) return;
      if (content.length > 1000) return;
      const res = await apiFetch(`/teams/${teamId}/messages`, { method: 'POST', body: JSON.stringify({ content }) });
      if (res?.ok) { inp.value = ''; updateCharCount(); await fetchMessages(lastCreatedAt); }
    }

    async function deleteMsg(id) {
      const res = await apiFetch(`/messages/${id}`, { method: 'DELETE' });
      if (res?.ok) { const el = document.querySelector(`[data-id="${id}"]`); el?.remove(); }
    }

    function updateCharCount() {
      const len = document.getElementById('msgInput').value.length;
      const counter = document.getElementById('charCount');
      counter.textContent = `${len.toLocaleString()} / 1,000`;
      counter.classList.toggle('text-red-500', len > 1000);
      document.getElementById('sendBtn').disabled = len > 1000 || len === 0;
    }

    document.getElementById('msgInput').addEventListener('input', updateCharCount);
    document.getElementById('msgInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    function setPollStatus(ok) {
      const el = document.getElementById('pollStatus');
      if (el) { el.textContent = ok ? '● 5초마다 새로고침' : '⚠ 연결 끊김 · 재시도 중'; el.className = ok ? 'text-xs text-green-500' : 'text-xs text-red-400'; }
    }

    function schedulePoll() {
      clearTimeout(pollTimer);
      pollTimer = setTimeout(async () => {
        try {
          await fetchMessages(lastCreatedAt);
        } catch {
          retryCount++; retryDelay = Math.min(retryDelay * 2, 60000);
          setPollStatus(false);
        }
        schedulePoll();
      }, retryCount === 0 ? 5000 : retryDelay);
    }

    document.getElementById('menuBtn').addEventListener('click', () => document.getElementById('mobileMenu').classList.remove('hidden'));
    function closeMobileMenu() { document.getElementById('mobileMenu').classList.add('hidden'); }

    async function doLogout() {
      await apiFetch('/auth/logout', { method: 'POST' });
      removeToken(); removeUser(); window.location.href = 'login.html';
    }

    loadTeam();
    fetchMessages().then(schedulePoll);
  </script>
</body>
</html>
