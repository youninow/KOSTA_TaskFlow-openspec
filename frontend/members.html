<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TaskFlow — 팀 멤버</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100">
  <header class="bg-white shadow-sm px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-4">
      <span class="text-teal-600 font-bold text-lg hidden md:block">TaskFlow</span>
      <span id="teamName" class="font-semibold text-gray-700"></span>
    </div>
    <nav class="hidden md:flex gap-2">
      <a href="kanban.html" class="px-4 py-1.5 border rounded text-sm font-medium text-gray-600 hover:bg-gray-50">칸반</a>
      <a href="chat.html" class="px-4 py-1.5 border rounded text-sm font-medium text-gray-600 hover:bg-gray-50">채팅</a>
      <a href="members.html" class="px-4 py-1.5 bg-teal-600 text-white rounded text-sm font-medium">멤버</a>
    </nav>
    <button onclick="doLogout()" class="text-sm text-gray-500 hover:text-gray-700">로그아웃</button>
  </header>

  <div class="max-w-lg mx-auto mt-8 px-4 space-y-4">
    <!-- 초대코드 섹션 (owner만 표시) -->
    <div id="inviteSection" class="hidden bg-white rounded-xl shadow p-6">
      <h2 class="font-semibold text-lg mb-3">초대코드</h2>
      <p class="text-xs text-gray-400 mb-3">이 코드를 공유하면 누구든 팀에 합류할 수 있습니다.</p>
      <div class="flex items-center gap-3">
        <span id="inviteCodeDisplay" class="flex-1 font-mono text-xl tracking-widest text-teal-600 bg-teal-50 border border-teal-200 rounded-lg px-4 py-2 text-center"></span>
        <button id="copyBtn" onclick="copyInviteCode()"
          class="px-4 py-2 bg-teal-600 text-white text-sm rounded-lg hover:bg-teal-700 transition whitespace-nowrap">
          📋 복사
        </button>
      </div>
    </div>

    <!-- 멤버 목록 -->
    <div class="bg-white rounded-xl shadow p-6">
      <h2 class="font-semibold text-lg mb-4">팀 멤버 (<span id="memberCount">0</span>)</h2>
      <div id="memberList" class="space-y-3"></div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    requireAuth();
    const user = getUser();
    if (!user?.team_id) window.location.href = 'team.html';
    const teamId = user.team_id;

    let inviteCode = '';

    function copyInviteCode() {
      navigator.clipboard.writeText(inviteCode).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = '✓ 복사됨';
        btn.classList.replace('bg-teal-600', 'bg-green-600');
        setTimeout(() => { btn.textContent = '📋 복사'; btn.classList.replace('bg-green-600', 'bg-teal-600'); }, 1500);
      });
    }

    async function load() {
      const [teamRes, membersRes] = await Promise.all([
        apiFetch(`/teams/${teamId}`),
        apiFetch(`/teams/${teamId}/members`)
      ]);
      if (teamRes?.ok) {
        const d = await teamRes.json();
        document.getElementById('teamName').textContent = d.name;
        inviteCode = d.invite_code;
      }
      if (membersRes?.ok) {
        const members = await membersRes.json();
        document.getElementById('memberCount').textContent = members.length;

        // owner만 초대코드 섹션 표시
        const me = members.find(m => m.id === user.id);
        if (me?.role === 'owner') {
          document.getElementById('inviteCodeDisplay').textContent = inviteCode;
          document.getElementById('inviteSection').classList.remove('hidden');
        }

        const list = document.getElementById('memberList');
        list.innerHTML = '';
        members.forEach(m => {
          const isMe = m.id === user.id;
          const joined = new Date(m.joined_at).toLocaleDateString('ko-KR');
          const div = document.createElement('div');
          div.className = 'flex items-center gap-3 py-2 border-b last:border-0';
          div.innerHTML = `
            <div class="w-10 h-10 rounded-full bg-teal-100 text-teal-700 flex items-center justify-center font-bold text-sm flex-shrink-0">
              ${m.email[0].toUpperCase()}
            </div>
            <div class="flex-1">
              <p class="text-sm font-medium">${m.email}${isMe ? ' <span class="text-gray-400 font-normal">(나)</span>' : ''}</p>
              <p class="text-xs text-gray-400">${m.role === 'owner' ? '★ owner' : 'member'}</p>
            </div>
            <span class="text-xs text-gray-400">${joined}</span>`;
          list.appendChild(div);
        });
      }
    }

    async function doLogout() {
      await apiFetch('/auth/logout', { method: 'POST' });
      removeToken(); removeUser(); window.location.href = 'login.html';
    }

    load();
  </script>
</body>
</html>
