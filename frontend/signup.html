<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TaskFlow — 회원가입</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center">
  <div class="w-full max-w-sm bg-white rounded-xl shadow p-8">
    <div class="text-center mb-6">
      <span class="inline-block bg-teal-600 text-white font-bold px-4 py-2 rounded text-lg">TaskFlow</span>
      <h1 class="mt-4 text-2xl font-semibold">회원가입</h1>
    </div>
    <form id="signupForm" class="space-y-4">
      <div>
        <input id="email" type="email" placeholder="이메일 입력" required
          class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500"/>
        <p id="emailErr" class="hidden text-red-500 text-xs mt-1"></p>
      </div>
      <div>
        <input id="password" type="password" placeholder="비밀번호 (8자 이상)" required
          class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500"/>
        <p id="pwErr" class="hidden text-red-500 text-xs mt-1"></p>
      </div>
      <div id="serverErr" class="hidden bg-red-50 border border-red-300 text-red-700 rounded px-3 py-2 text-sm"></div>
      <button type="submit" id="submitBtn"
        class="w-full bg-teal-600 text-white font-semibold py-2 rounded hover:bg-teal-700 transition">
        가입하기
      </button>
    </form>
    <p class="mt-4 text-center text-sm text-gray-500">
      이미 계정이 있으신가요? <a href="login.html" class="text-teal-600 hover:underline">로그인</a>
    </p>
  </div>
  <script src="js/auth.js"></script>
  <script>
    const emailInput = document.getElementById('email');
    const pwInput = document.getElementById('password');

    function validateClient() {
      let ok = true;
      hideError('emailErr'); hideError('pwErr');
      if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(emailInput.value)) {
        showError('emailErr', '올바른 이메일 형식이 아닙니다'); ok = false;
      }
      if (pwInput.value.length < 8) {
        showError('pwErr', '8자 이상 입력해주세요'); ok = false;
      }
      return ok;
    }

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError('serverErr');
      if (!validateClient()) return;
      const btn = document.getElementById('submitBtn');
      btn.textContent = '처리 중…'; btn.disabled = true;
      const res = await apiFetch('/auth/signup', {
        method: 'POST',
        body: JSON.stringify({ email: emailInput.value, password: pwInput.value })
      });
      btn.textContent = '가입하기'; btn.disabled = false;
      if (!res) return;
      if (res.ok) {
        const data = await res.json();
        setToken(data.token); setUser(data.user);
        window.location.href = 'team.html';
      } else {
        const data = await res.json();
        const code = data.error?.code;
        if (code === 'EMAIL_TAKEN') showError('serverErr', data.error.message);
        else showError('serverErr', data.error?.message || '가입에 실패했습니다');
      }
    });
  </script>
</body>
</html>
