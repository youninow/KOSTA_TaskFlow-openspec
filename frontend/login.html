<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TaskFlow — 로그인</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center">
  <div class="w-full max-w-sm bg-white rounded-xl shadow p-8">
    <div class="text-center mb-6">
      <span class="inline-block bg-teal-600 text-white font-bold px-4 py-2 rounded text-lg">TaskFlow</span>
      <h1 class="mt-4 text-2xl font-semibold">로그인</h1>
    </div>
    <form id="loginForm" class="space-y-4">
      <input id="email" type="email" placeholder="이메일 입력" required
        class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500"/>
      <input id="password" type="password" placeholder="비밀번호" required
        class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500"/>
      <div id="errorMsg" class="hidden bg-red-50 border border-red-300 text-red-700 rounded px-3 py-2 text-sm"></div>
      <button type="submit" id="submitBtn"
        class="w-full bg-teal-600 text-white font-semibold py-2 rounded hover:bg-teal-700 transition">
        로그인
      </button>
    </form>
    <p class="mt-4 text-center text-sm text-gray-500">
      계정이 없으신가요? <a href="signup.html" class="text-teal-600 hover:underline">회원가입</a>
    </p>
  </div>
  <script src="js/auth.js"></script>
  <script>
    if (getToken()) {
      const u = getUser();
      window.location.href = u?.team_id ? 'kanban.html' : 'team.html';
    }
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError('errorMsg');
      const btn = document.getElementById('submitBtn');
      btn.textContent = '처리 중…'; btn.disabled = true;
      const res = await apiFetch('/auth/login', {
        method: 'POST',
        body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
      });
      btn.textContent = '로그인'; btn.disabled = false;
      if (!res) return;
      if (res.ok) {
        const data = await res.json();
        setToken(data.token); setUser(data.user);
        window.location.href = data.user.team_id ? 'kanban.html' : 'team.html';
      } else {
        const data = await res.json();
        showError('errorMsg', data.error?.message || '로그인에 실패했습니다');
      }
    });
  </script>
</body>
</html>
